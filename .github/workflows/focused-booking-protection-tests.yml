name: Focused booking protection tests

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  focused-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/onprez
      DIRECT_URL: postgresql://ci:ci@localhost:5432/onprez

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Capture Stripe configuration test output
        run: |
          set +e
          npx jest src/lib/stripe/__tests__/config.test.ts --runInBand --verbose > stripe-test-output.txt 2>&1
          echo $? > stripe-test-exit-code.txt
          exit 0

      - name: Upload Stripe test diagnostics
        uses: actions/upload-artifact@v6
        with:
          name: stripe-test-diagnostics
          path: |
            stripe-test-output.txt
            stripe-test-exit-code.txt
          if-no-files-found: error
          retention-days: 1
