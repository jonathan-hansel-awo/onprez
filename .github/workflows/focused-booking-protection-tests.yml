name: Focused booking protection tests

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  focused-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/onprez
      DIRECT_URL: postgresql://ci:ci@localhost:5432/onprez

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run entitlement tests
        run: npx jest src/lib/features/__tests__/entitlements.test.ts --runInBand --verbose

      - name: Run Stripe configuration tests
        run: npx jest src/lib/stripe/__tests__/config.test.ts --runInBand --verbose
