name: Test diagnostics

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Clone branch quietly
        run: git clone -q --depth 1 --branch feat/presence-editor-art-direction-therapist https://github.com/jonathan-hansel-awo/onprez.git repo
      - name: Install dependencies quietly
        working-directory: repo
        run: npm ci --silent
      - name: Report failing assertions only
        working-directory: repo
        run: |
          npx jest --ci --runInBand --silent --json --outputFile=test-results.json || true
          python - <<'PY'
          import json
          from pathlib import Path

          results = json.loads(Path('test-results.json').read_text())
          failures = []
          for suite in results.get('testResults', []):
              if suite.get('status') != 'failed':
                  continue
              failures.append(f"SUITE: {suite.get('name')}")
              for assertion in suite.get('assertionResults', []):
                  if assertion.get('status') == 'failed':
                      failures.append(f"TEST: {assertion.get('fullName')}")
                      failures.extend(assertion.get('failureMessages', []))
          print('\n'.join(failures) if failures else 'No failing assertions')
          raise SystemExit(1 if failures else 0)
          PY
