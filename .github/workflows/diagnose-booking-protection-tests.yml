name: Diagnose booking protection tests

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/onprez
      DIRECT_URL: postgresql://ci:ci@localhost:5432/onprez

    steps:
      - name: Check out branch
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run focused tests
        run: |
          set +e
          npx jest \
            src/lib/features/__tests__/entitlements.test.ts \
            src/lib/stripe/__tests__/config.test.ts \
            --runInBand --verbose > booking-protection-test-output.txt 2>&1
          echo $? > booking-protection-test-exit-code.txt
          exit 0

      - name: Upload diagnostic output
        uses: actions/upload-artifact@v6
        with:
          name: booking-protection-test-diagnostics
          path: |
            booking-protection-test-output.txt
            booking-protection-test-exit-code.txt
          if-no-files-found: error
          retention-days: 1
