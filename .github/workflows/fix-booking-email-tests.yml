name: Fix booking email tests

on:
  push:
    branches:
      - fix/booking-email-notifications

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/onprez
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/onprez
      APP_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      RESEND_API_KEY: re_ci_placeholder
      NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: ci-placeholder
      CLOUDINARY_API_KEY: ci-placeholder
      CLOUDINARY_API_SECRET: ci-placeholder
      JWT_SECRET: ci-only-jwt-secret-at-least-32-characters
    steps:
      - name: Check out branch
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Update public booking API tests
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('__tests__/api/bookings-public.test.ts')
          text = path.read_text()

          def replace_once(source: str, target: str) -> None:
              global text
              if source not in text:
                  raise SystemExit(f'Expected test anchor was not found: {source[:100]!r}')
              text = text.replace(source, target, 1)

          replace_once(
              "import { createBooking } from '@/lib/services/booking'\n",
              "import { createBooking } from '@/lib/services/booking'\n"
              "import { sendBookingCreatedNotifications } from '@/lib/services/booking-notifications'\n",
          )

          replace_once(
              "jest.mock('@/lib/services/booking', () => ({\n"
              "  createBooking: jest.fn(),\n"
              "}))\n\n",
              "jest.mock('@/lib/services/booking', () => ({\n"
              "  createBooking: jest.fn(),\n"
              "}))\n\n"
              "jest.mock('@/lib/services/booking-notifications', () => ({\n"
              "  sendBookingCreatedNotifications: jest.fn(),\n"
              "}))\n\n",
          )

          replace_once(
              "const mockedCreateBooking = createBooking as jest.Mock\n"
              "const mockedCheckRateLimit = checkRateLimit as jest.Mock\n",
              "const mockedCreateBooking = createBooking as jest.Mock\n"
              "const mockedSendBookingCreatedNotifications = sendBookingCreatedNotifications as jest.Mock\n"
              "const mockedCheckRateLimit = checkRateLimit as jest.Mock\n",
          )

          replace_once(
              "  customerNotes: 'Please call on arrival',\n"
              "  createdAt: new Date('2026-07-10T10:00:00.000Z'),\n",
              "  customerNotes: 'Please call on arrival',\n"
              "  customerPhone: '07123456789',\n"
              "  totalAmount: 25,\n"
              "  createdAt: new Date('2026-07-10T10:00:00.000Z'),\n",
          )

          replace_once(
              "    price: 25,\n"
              "    duration: 30,\n"
              "  },\n",
              "    price: 25,\n"
              "    duration: 30,\n"
              "    currency: 'GBP',\n"
              "  },\n",
          )

          replace_once(
              "    timezone: 'Europe/London',\n"
              "    address: '123 Test Street',\n"
              "    slug: 'test-business',\n"
              "  },\n",
              "    timezone: 'Europe/London',\n"
              "    email: 'business@example.com',\n"
              "    address: '123 Test Street',\n"
              "    slug: 'test-business',\n"
              "    owner: { email: 'owner@example.com' },\n"
              "  },\n",
          )

          replace_once(
              "    mockedCheckRateLimit.mockResolvedValue({\n"
              "      allowed: true,\n"
              "      limit: 10,\n"
              "      remaining: 9,\n"
              "      resetAt: new Date(Date.now() + 60_000),\n"
              "    })\n",
              "    mockedCheckRateLimit.mockResolvedValue({\n"
              "      allowed: true,\n"
              "      limit: 10,\n"
              "      remaining: 9,\n"
              "      resetAt: new Date(Date.now() + 60_000),\n"
              "    })\n"
              "    mockedSendBookingCreatedNotifications.mockResolvedValue({\n"
              "      customer: { success: true, messageId: 'customer-message' },\n"
              "      business: { success: true, messageId: 'business-message' },\n"
              "    })\n",
          )

          replace_once(
              "      expect(mockedPrisma.appointment.findFirst).toHaveBeenCalledWith(\n"
              "        expect.objectContaining({\n"
              "          where: {\n"
              "            id: 'abc12345bookingid',\n"
              "            businessId: 'business-1',\n"
              "          },\n"
              "        })\n"
              "      )\n"
              "    })\n",
              "      expect(mockedPrisma.appointment.findFirst).toHaveBeenCalledWith(\n"
              "        expect.objectContaining({\n"
              "          where: {\n"
              "            id: 'abc12345bookingid',\n"
              "            businessId: 'business-1',\n"
              "          },\n"
              "        })\n"
              "      )\n"
              "      expect(mockedSendBookingCreatedNotifications).toHaveBeenCalledWith(\n"
              "        expect.objectContaining({\n"
              "          bookingId: 'abc12345bookingid',\n"
              "          status: 'CONFIRMED',\n"
              "          customerEmail: 'john@example.com',\n"
              "          businessEmail: 'business@example.com',\n"
              "          businessOwnerEmail: 'owner@example.com',\n"
              "          currency: 'GBP',\n"
              "        })\n"
              "      )\n"
              "    })\n",
          )

          replace_once(
              "      expect(mockedCreateBooking).toHaveBeenCalledWith(\n"
              "        expect.any(String),\n"
              "        expect.any(String),\n"
              "        expect.any(String),\n"
              "        expect.any(String),\n"
              "        expect.any(Object),\n"
              "        expect.objectContaining({\n"
              "          status: 'PENDING',\n"
              "        })\n"
              "      )\n"
              "    })\n",
              "      expect(mockedCreateBooking).toHaveBeenCalledWith(\n"
              "        expect.any(String),\n"
              "        expect.any(String),\n"
              "        expect.any(String),\n"
              "        expect.any(String),\n"
              "        expect.any(Object),\n"
              "        expect.objectContaining({\n"
              "          status: 'PENDING',\n"
              "        })\n"
              "      )\n"
              "      expect(mockedSendBookingCreatedNotifications).toHaveBeenCalledWith(\n"
              "        expect.objectContaining({ status: 'PENDING' })\n"
              "      )\n"
              "    })\n",
          )

          replace_once(
              "      expect(response.status).toBe(200)\n"
              "      expect(response.headers.get('Idempotency-Replayed')).toBe('true')\n",
              "      expect(response.status).toBe(200)\n"
              "      expect(response.headers.get('Idempotency-Replayed')).toBe('true')\n"
              "      expect(mockedSendBookingCreatedNotifications).not.toHaveBeenCalled()\n",
          )

          path.write_text(text)
          PY

      - name: Format and verify
        run: |
          npx prettier --write __tests__/api/bookings-public.test.ts
          npm test -- --runInBand __tests__/api/bookings-public.test.ts src/lib/services/booking-notifications.test.ts
          npm run type-check

      - name: Commit fix and clean diagnostics
        run: |
          rm -f .github/workflows/fix-booking-email-tests.yml
          rm -f booking-email-test-diagnostic.txt
          rm -f .booking-email-diagnostic-trigger
          rm -f .booking-email-test-fix-trigger
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "test: cover booking notification integration"
          git push
