name: Format editorial editor branch

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  format:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Wire Editorial Beauty into signup template application
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/lib/templates/apply-signup-template.ts')
          text = path.read_text()

          default_import = "import { createDefaultPresencePageContent } from '@/lib/utils/default-presence-page'\n"
          editorial_import = "import { createEditorialBeautySections } from '@/lib/templates/editorial-beauty-sections'\n"
          if editorial_import not in text:
              text = text.replace(default_import, default_import + editorial_import)

          old_theme_type = """    fontFamily: string
  }
}"""
          new_theme_type = """    fontFamily: string
    headingFont?: string
    buttonStyle?: 'rounded' | 'square' | 'pill'
    spacing?: 'compact' | 'normal' | 'relaxed'
  }
}"""
          text = text.replace(old_theme_type, new_theme_type)

          old_sections = """    template.slug === 'heavenly-pamper-palace'
      ? createHeavenlyPamperPalaceSections(businessName)
      : template.slug === 'regent-barber'
        ? createRegentBarberSections(businessName)
        : createGenericTemplateSections(businessName, template)"""
          new_sections = """    template.slug === 'heavenly-pamper-palace'
      ? createHeavenlyPamperPalaceSections(businessName)
      : template.slug === 'editorial-beauty'
        ? createEditorialBeautySections(businessName)
        : template.slug === 'regent-barber'
          ? createRegentBarberSections(businessName)
          : createGenericTemplateSections(businessName, template)"""
          text = text.replace(old_sections, new_sections)

          old_font = """      fontFamily: template.slug === 'regent-barber' ? 'Georgia' : 'Inter',"""
          new_font = """      fontFamily: 'Inter',
      headingFont:
        template.slug === 'editorial-beauty' || template.slug === 'regent-barber'
          ? 'Georgia'
          : 'Inter',
      buttonStyle: template.slug === 'editorial-beauty' ? 'square' : 'rounded',
      spacing: template.slug === 'editorial-beauty' ? 'relaxed' : 'normal',"""
          text = text.replace(old_font, new_font)

          path.write_text(text)
          PY

      - name: Format changed presence editor files
        run: |
          npx prettier --write \
            src/types/page-sections.ts \
            src/components/presence/editor/SectionAppearanceEditor.tsx \
            src/components/presence/editor/SectionEditorPanel.tsx \
            src/components/presence/editor/sections/AboutSectionEditor.tsx \
            src/components/presence/editor/sections/GallerySectionEditor.tsx \
            src/components/presence/editor/sections/HeroSectionEditor.tsx \
            src/components/presence/editor/sections/ServicesSectionEditor.tsx \
            src/components/presence/editor/sections/TestimonialsSectionEditor.tsx \
            src/components/presence/sections/AboutSection.tsx \
            src/components/presence/sections/GallerySection.tsx \
            src/components/presence/sections/HeroSection.tsx \
            src/components/presence/sections/ServicesSection.tsx \
            src/components/presence/sections/TestimonialsSection.tsx \
            src/components/presence/sections/section-style.ts \
            src/lib/templates/apply-signup-template.ts \
            src/lib/templates/editorial-beauty-sections.ts \
            src/lib/templates/__tests__/apply-signup-template.test.ts

      - name: Commit integration and formatting when needed
        run: |
          if git diff --quiet; then
            echo "No integration or formatting changes needed"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/types/page-sections.ts src/components/presence src/lib/templates
          git commit -m "feat: apply premium editorial settings during signup"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
