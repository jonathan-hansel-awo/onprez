name: Format editorial editor branch

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  format:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format changed presence editor files
        run: |
          npx prettier --write \
            src/types/page-sections.ts \
            src/components/presence/editor/SectionAppearanceEditor.tsx \
            src/components/presence/editor/SectionEditorPanel.tsx \
            src/components/presence/editor/sections/AboutSectionEditor.tsx \
            src/components/presence/editor/sections/GallerySectionEditor.tsx \
            src/components/presence/editor/sections/HeroSectionEditor.tsx \
            src/components/presence/editor/sections/ServicesSectionEditor.tsx \
            src/components/presence/editor/sections/TestimonialsSectionEditor.tsx \
            src/components/presence/sections/AboutSection.tsx \
            src/components/presence/sections/GallerySection.tsx \
            src/components/presence/sections/HeroSection.tsx \
            src/components/presence/sections/ServicesSection.tsx \
            src/components/presence/sections/TestimonialsSection.tsx \
            src/components/presence/sections/section-style.ts \
            src/lib/templates/apply-signup-template.ts \
            src/lib/templates/editorial-beauty-sections.ts \
            src/lib/templates/__tests__/apply-signup-template.test.ts

      - name: Commit formatting when needed
        run: |
          if git diff --quiet; then
            echo "No formatting changes needed"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/types/page-sections.ts src/components/presence src/lib/templates
          git commit -m "style: format premium editorial editor changes"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
