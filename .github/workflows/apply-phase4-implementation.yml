name: Apply Phase 4 implementation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/onprez
      DIRECT_URL: postgresql://ci:ci@localhost:5432/onprez
      APP_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      RESEND_API_KEY: re_ci_placeholder
      NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: ci-placeholder
      CLOUDINARY_API_KEY: ci-placeholder
      CLOUDINARY_API_SECRET: ci-placeholder
      JWT_SECRET: ci-only-jwt-secret-at-least-32-characters

    steps:
      - name: Check out feature branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply permanent implementation
        run: |
          cat .phase4/patch-00 .phase4/patch-01 .phase4/patch-02 | base64 --decode | xz --decompress > /tmp/phase4.patch
          git apply --check /tmp/phase4.patch
          git apply /tmp/phase4.patch
          python <<'PY'
          from pathlib import Path

          checkout = Path('src/lib/booking-protection/checkout.ts')
          checkout_text = checkout.read_text().replace(
              'targetStatus: AppointmentStatus.PENDING | AppointmentStatus.CONFIRMED',
              "targetStatus: 'PENDING' | 'CONFIRMED'",
          )
          checkout.write_text(checkout_text)

          success = Path('src/app/(public)/[handle]/book/success/BookingSuccessClient.tsx')
          success_text = success.read_text().replace(
              """          latest = result.data
          if (
            paymentResult !== 'success' ||
            !latest.payment?.requiresDeposit ||
            latest.payment.depositPaid
          ) {""",
              """          const current = result.data as BookingDetails
          latest = current
          if (
            paymentResult !== 'success' ||
            !current.payment?.requiresDeposit ||
            current.payment.depositPaid
          ) {""",
          )
          success.write_text(success_text)
          PY
          rm -rf .phase4 .phase4-export-trigger
          rm -f .github/workflows/export-phase4-source.yml
          rm -f .github/workflows/apply-phase4-implementation.yml

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format implementation
        run: |
          npx prisma format
          npx prettier --write \
            __tests__/api/bookings-public.test.ts \
            __tests__/components/public-booking-confirmation.test.tsx \
            src/app/'(public)'/'[handle]'/book/'[serviceId]'/BookingPageClient.tsx \
            src/app/'(public)'/'[handle]'/book/'[serviceId]'/page.tsx \
            src/app/'(public)'/'[handle]'/book/success/BookingSuccessClient.tsx \
            src/app/'(public)'/'[handle]'/book/success/page.tsx \
            src/app/api/bookings/payment-status/route.ts \
            src/app/api/bookings/route.ts \
            src/app/api/webhooks/stripe/__tests__/route.test.ts \
            src/app/api/webhooks/stripe/route.ts \
            src/components/booking/BookingWidget.tsx \
            src/components/booking/steps/ConfirmationStep.tsx \
            src/components/booking/steps/ServiceSelectionStep.tsx \
            src/lib/booking-protection/__tests__/checkout.test.ts \
            src/lib/booking-protection/checkout.ts \
            src/lib/hooks/useCreateBooking.ts \
            src/lib/services/booking-notifications.ts \
            src/lib/services/booking.ts

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Type-check
        id: typecheck
        continue-on-error: true
        run: |
          set -o pipefail
          npm run type-check 2>&1 | tee typecheck.log

      - name: Upload type-check diagnostics
        if: steps.typecheck.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: phase4-typecheck-diagnostics-corrected
          path: typecheck.log
          retention-days: 1

      - name: Stop after type-check failure
        if: steps.typecheck.outcome == 'failure'
        run: exit 1

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Run tests
        run: npm test -- --runInBand

      - name: Build application
        run: npm run build

      - name: Commit permanent files
        run: |
          git config user.name 'onprez-ci'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          git commit -m 'feat: add payment-backed booking deposit flow'
          git push origin HEAD:${{ github.head_ref }}
