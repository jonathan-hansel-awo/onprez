name: One-off booking fix formatter

on:
  push:
    branches:
      - fix/booking-local-date-and-confirmation

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: fix/booking-local-date-and-confirmation

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format changed booking files
        run: |
          npx prettier --write \
            "__tests__/components/public-booking-confirmation.test.tsx" \
            "src/app/(public)/[handle]/book/BookingIndexClient.tsx" \
            "src/app/(public)/[handle]/book/[serviceId]/BookingPageClient.tsx" \
            "src/app/(public)/[handle]/book/success/BookingSuccessClient.tsx" \
            "src/components/booking/BookingWidget.tsx" \
            "src/lib/booking/public-booking.test.ts" \
            "src/lib/booking/public-booking.ts"

      - name: Commit formatted files and remove one-off workflow
        run: |
          rm .github/workflows/one-off-format-booking-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          if ! git diff --cached --quiet; then
            git commit -m "style: format booking reliability fix"
            git push origin HEAD:fix/booking-local-date-and-confirmation
          fi
