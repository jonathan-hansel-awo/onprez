name: Format booking protection onboarding

on:
  push:
    branches:
      - feat/booking-protection-stripe-onboarding

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out branch
        uses: actions/checkout@v7
        with:
          ref: feat/booking-protection-stripe-onboarding

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format onboarding files
        run: |
          npx prettier --write \
            src/app/api/business/payments/stripe/connect/__tests__/route.test.ts \
            src/app/api/business/payments/stripe/connect/route.ts \
            src/app/api/business/payments/stripe/refresh/route.ts \
            src/app/api/business/payments/stripe/return/route.ts \
            src/app/api/business/payments/stripe/status/route.ts \
            src/app/api/webhooks/stripe/__tests__/route.test.ts \
            src/app/api/webhooks/stripe/route.ts \
            src/app/dashboard/settings/page.tsx \
            src/app/dashboard/settings/payments/page.tsx \
            src/lib/stripe/__tests__/config.test.ts \
            src/lib/stripe/__tests__/connect-accounts.test.ts \
            src/lib/stripe/config.ts \
            src/lib/stripe/connect-accounts.ts

      - name: Commit formatting
        run: |
          if git diff --quiet; then
            echo "No formatting changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src
          git commit -m "style: format Stripe onboarding implementation"
          git push origin HEAD:feat/booking-protection-stripe-onboarding
