name: Format booking protection foundation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out branch
        uses: actions/checkout@v7
        with:
          ref: feat/booking-protection-foundation

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Format foundation files
        run: |
          npx prettier --write \
            scripts/set-booking-deposit-entitlement.ts \
            src/lib/features/entitlements.ts \
            src/lib/features/__tests__/entitlements.test.ts \
            src/lib/stripe/config.ts \
            src/lib/stripe/__tests__/config.test.ts

      - name: Commit formatting
        run: |
          if git diff --quiet; then
            echo "No formatting changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            scripts/set-booking-deposit-entitlement.ts \
            src/lib/features/entitlements.ts \
            src/lib/features/__tests__/entitlements.test.ts \
            src/lib/stripe/config.ts \
            src/lib/stripe/__tests__/config.test.ts
          git commit -m "style: format booking protection foundation"
          git push origin HEAD:feat/booking-protection-foundation
