name: Temporary type-check diagnostics

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  diagnose:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Capture type-check output
        shell: bash
        run: |
          set +e
          npm run type-check > TYPECHECK_DIAGNOSTICS.txt 2>&1
          status=$?
          echo "TYPECHECK_EXIT_CODE=$status" >> TYPECHECK_DIAGNOSTICS.txt
          exit 0

      - name: Commit diagnostics
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add TYPECHECK_DIAGNOSTICS.txt
          git commit -m "chore: capture temporary type-check diagnostics"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
