name: One-off formatting diagnostic

on:
  push:
    branches:
      - fix/booking-local-date-and-confirmation

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: fix/booking-local-date-and-confirmation

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Capture differently formatted files
        run: npx prettier --list-different . > .format-different.txt || true

      - name: Commit diagnostic and remove workflow
        run: |
          rm .github/workflows/one-off-format-diagnostic.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "chore: capture formatting diagnostic"
          git push origin HEAD:fix/booking-local-date-and-confirmation
