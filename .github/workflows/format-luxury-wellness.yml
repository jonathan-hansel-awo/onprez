name: Format luxury wellness preview

on:
  push:
    branches:
      - feat/fp-006-template-onboarding
    paths:
      - .github/workflows/format-luxury-wellness.yml

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/fp-006-template-onboarding
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prettier --write src/components/templates/LuxuryWellnessPreview.tsx
      - name: Commit formatted file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No formatting changes needed"
            exit 0
          fi
          git add src/components/templates/LuxuryWellnessPreview.tsx
          git commit -m "style: format luxury wellness preview"
          git push origin HEAD:feat/fp-006-template-onboarding
