name: Admin Jest diagnostics

on:
  pull_request:

permissions:
  contents: read

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/onprez
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/onprez
      APP_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      RESEND_API_KEY: re_ci_placeholder
      NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: ci-placeholder
      CLOUDINARY_API_KEY: ci-placeholder
      CLOUDINARY_API_SECRET: ci-placeholder
      JWT_SECRET: ci-only-jwt-secret-at-least-32-characters
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Capture Jest output
        run: npm test -- --ci --runInBand > admin-jest.log 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: admin-jest-log
          path: admin-jest.log
