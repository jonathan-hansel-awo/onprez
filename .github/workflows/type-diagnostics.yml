name: Type diagnostics

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feat/presence-editor-art-direction-therapist
      - name: Install dependencies quietly
        run: npm ci --silent
      - name: Apply strict section return typing
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/lib/templates/premium-runtime-art-direction.ts')
          source = path.read_text()
          before = 'const enrichedSections = sections.map(section => {'
          after = 'const enrichedSections: PageSection[] = sections.map((section): PageSection => {'
          if before not in source:
              raise SystemExit('Expected runtime art-direction declaration was not found')
          path.write_text(source.replace(before, after, 1))
          PY
          npx prettier --write src/lib/templates/premium-runtime-art-direction.ts src/lib/templates/presence-template-migration.ts
      - name: Verify TypeScript
        run: npm run type-check
      - name: Commit typed files
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/lib/templates/premium-runtime-art-direction.ts src/lib/templates/presence-template-migration.ts
          git commit -m "Tighten rich presence section typing"
          git push origin HEAD:feat/presence-editor-art-direction-therapist
