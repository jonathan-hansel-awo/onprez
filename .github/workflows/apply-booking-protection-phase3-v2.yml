name: Apply Booking Protection Phase 3 v2

on:
  pull_request:
    branches:
      - main

permissions:
  actions: read
  contents: write

jobs:
  apply-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/onprez
      DIRECT_URL: postgresql://ci:ci@localhost:5432/onprez
      APP_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      RESEND_API_KEY: re_ci_placeholder
      NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: ci-placeholder
      CLOUDINARY_API_KEY: ci-placeholder
      CLOUDINARY_API_SECRET: ci-placeholder
      JWT_SECRET: ci-only-jwt-secret-at-least-32-characters
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Check out branch
        uses: actions/checkout@v7
        with:
          ref: feat/booking-protection-service-controls-v2
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: npm

      - name: Restore verified Phase 3 artifact
        run: |
          gh api repos/${GITHUB_REPOSITORY}/actions/artifacts/8558840016/zip > /tmp/phase3-artifact.zip
          rm -rf /tmp/phase3-artifact
          mkdir -p /tmp/phase3-artifact
          unzip -q /tmp/phase3-artifact.zip -d /tmp/phase3-artifact
          cp -a /tmp/phase3-artifact/prisma/. prisma/
          cp -a /tmp/phase3-artifact/src/. src/
          patch -p1 < phase3-final-adjustments.patch
          rm -f phase3-final-adjustments.patch
          rm -f phase3-v2.zip.b64
          rm -f .github/workflows/apply-booking-protection-phase3-v2.yml

      - name: Install dependencies
        run: npm ci

      - name: Format Prisma schema
        run: npx prisma format

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Format TypeScript files
        run: |
          npx prettier --write \
            src/lib/booking-protection/config.ts \
            src/lib/booking-protection/__tests__/config.test.ts \
            src/components/booking-protection/booking-protection-configurator.tsx \
            src/app/api/business/payments/booking-protection/route.ts \
            src/app/api/business/payments/booking-protection/__tests__/route.test.ts \
            src/app/api/services/route.ts \
            'src/app/api/services/[id]/route.ts' \
            'src/app/api/public/businesses/[handle]/services/route.ts' \
            src/app/dashboard/services/new/page.tsx \
            'src/app/dashboard/services/[id]/edit/page.tsx' \
            src/app/dashboard/settings/payments/page.tsx

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Run Booking Protection config tests
        run: |
          set -o pipefail
          npm test -- --runInBand src/lib/booking-protection/__tests__/config.test.ts 2>&1 | tee /tmp/phase3-config-test.log

      - name: Run Booking Protection route tests
        run: |
          set -o pipefail
          npm test -- --runInBand src/app/api/business/payments/booking-protection/__tests__/route.test.ts 2>&1 | tee /tmp/phase3-route-test.log

      - name: Upload focused test diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: phase3-focused-test-diagnostics
          path: /tmp/phase3-*-test.log
          retention-days: 1

      - name: Run full test suite
        run: |
          set -o pipefail
          npm test -- --runInBand 2>&1 | tee /tmp/phase3-full-test.log

      - name: Upload full-suite diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: phase3-full-test-diagnostics
          path: /tmp/phase3-full-test.log
          retention-days: 1

      - name: Build application
        run: npm run build

      - name: Commit permanent Phase 3 implementation
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'feat: add Booking Protection service deposit controls'
          git push origin HEAD:feat/booking-protection-service-controls-v2
