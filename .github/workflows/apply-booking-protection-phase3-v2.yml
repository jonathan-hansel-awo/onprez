name: Apply Booking Protection Phase 3 v2

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/onprez
      DIRECT_URL: postgresql://ci:ci@localhost:5432/onprez
      APP_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      RESEND_API_KEY: re_ci_placeholder
      NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: ci-placeholder
      CLOUDINARY_API_KEY: ci-placeholder
      CLOUDINARY_API_SECRET: ci-placeholder
      JWT_SECRET: ci-only-jwt-secret-at-least-32-characters

    steps:
      - name: Check out branch
        uses: actions/checkout@v7
        with:
          ref: feat/booking-protection-service-controls-v2
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: npm

      - name: Apply prepared Phase 3 bundle
        run: |
          base64 --decode phase3-v2.zip.b64 > /tmp/phase3-v2.zip
          rm -rf /tmp/phase3-v2
          mkdir -p /tmp/phase3-v2
          unzip -q /tmp/phase3-v2.zip -d /tmp/phase3-v2
          cp -a /tmp/phase3-v2/. .
          rm -f phase3-v2.zip.b64
          rm -f .github/workflows/apply-booking-protection-phase3-v2.yml

      - name: Install dependencies
        run: npm ci

      - name: Generate and format
        run: |
          npx prisma format
          npx prisma generate
          npx prettier --write \
            prisma/schema.prisma \
            src/lib/booking-protection/config.ts \
            src/lib/booking-protection/__tests__/config.test.ts \
            src/components/booking-protection/booking-protection-configurator.tsx \
            src/app/api/business/payments/booking-protection/route.ts \
            src/app/api/business/payments/booking-protection/__tests__/route.test.ts \
            src/app/api/services/route.ts \
            'src/app/api/services/[id]/route.ts' \
            'src/app/api/public/businesses/[handle]/services/route.ts' \
            src/app/dashboard/services/new/page.tsx \
            'src/app/dashboard/services/[id]/edit/page.tsx' \
            src/app/dashboard/settings/payments/page.tsx

      - name: Validate permanent implementation
        run: |
          npm run format:check
          npm run lint
          npm run type-check
          npx prisma validate
          npm test -- --runInBand
          npm run build

      - name: Commit permanent Phase 3 implementation
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'feat: add Booking Protection service deposit controls'
          git push origin HEAD:feat/booking-protection-service-controls-v2
