name: Apply premium canonical renderer

on:
  push:
    branches:
      - feat/premium-canonical-renderer

permissions:
  contents: write

jobs:
  generate:
    if: "!contains(github.event.head_commit.message, 'feat: amp canonical renderer and redesign premium templates')"
    runs-on: ubuntu-latest
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v7
        with:
          ref: feat/premium-canonical-renderer

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: npm

      - name: Rebuild and run implementation generator
        run: |
          cat tmp/premium-renderer-chunk-*.txt > /tmp/apply.py.gz.b64
          base64 -d /tmp/apply.py.gz.b64 | gzip -d > /tmp/apply.py
          python /tmp/apply.py

      - name: Install dependencies
        run: npm ci

      - name: Format generated implementation
        run: |
          npx prettier --write \
            src/components/presence/sections/HeroSection.tsx \
            src/components/presence/sections/AboutSection.tsx \
            src/components/presence/sections/NavbarSection.tsx \
            src/components/presence/sections/ContactSection.tsx \
            src/components/presence/sections/SectionRenderer.tsx \
            src/types/page-sections.ts \
            src/lib/templates/canonical-template-engine.ts \
            src/lib/templates/__tests__/premium-canonical-renderer.test.ts \
            docs/presence/PREMIUM_CANONICAL_RENDERER.md

      - name: Commit implementation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src docs
          git commit -m "feat: amp canonical renderer and redesign premium templates"
          git push origin HEAD:feat/premium-canonical-renderer
