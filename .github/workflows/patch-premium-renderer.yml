name: Patch premium canonical renderer

on:
  push:
    branches:
      - feat/premium-canonical-renderer

permissions:
  contents: write

jobs:
  patch:
    if: "!contains(github.event.head_commit.message, 'fix: harden premium renderer links and contrast')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feat/premium-canonical-renderer
      - uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: npm
      - name: Apply renderer fixes
        run: |
          python - <<'PY'
          from pathlib import Path

          replacements = {
              'src/components/presence/sections/HeroSection.tsx': [
                  ('href={`#${section.id}-next`}', "href={resolvedSecondaryCtaLink || '#'}"),
              ],
              'src/components/presence/sections/ContactSection.tsx': [
                  ("const textColor = section.appearance?.textColor || '#111827'", "const textColor = layout === 'immersive' ? '#FFFFFF' : section.appearance?.textColor || '#111827'"),
              ],
              'src/lib/templates/canonical-template-engine.ts': [
                  ("secondaryCtaLink: `#${sectionId(slug, isCreative ? 'GALLERY' : 'SERVICES', isCreative ? 4 : 3)}`", "secondaryCtaLink: `#${sectionId(template.slug, isCreative ? 'GALLERY' : 'SERVICES', isCreative ? 4 : 3)}`"),
              ],
          }

          for filename, changes in replacements.items():
              path = Path(filename)
              content = path.read_text()
              for old, new in changes:
                  if old not in content:
                      raise SystemExit(f'Missing expected text in {filename}: {old}')
                  content = content.replace(old, new, 1)
              path.write_text(content)
          PY
      - name: Install dependencies
        run: npm ci
      - name: Format patched files
        run: |
          npx prettier --write \
            src/components/presence/sections/HeroSection.tsx \
            src/components/presence/sections/ContactSection.tsx \
            src/lib/templates/canonical-template-engine.ts
      - name: Commit fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src
          git commit -m "fix: harden premium renderer links and contrast"
          git push origin HEAD:feat/premium-canonical-renderer
