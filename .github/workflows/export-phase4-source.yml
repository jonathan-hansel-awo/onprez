name: Export Phase 4 source

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Prepare source archive
        run: |
          mkdir phase4-source
          rsync -a --exclude='.git' --exclude='node_modules' --exclude='.next' ./ phase4-source/
      - uses: actions/upload-artifact@v4
        with:
          name: phase4-source
          path: phase4-source
          retention-days: 1
