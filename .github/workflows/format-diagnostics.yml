name: Format diagnostics

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feat/presence-editor-art-direction-therapist
      - name: Install dependencies quietly
        run: npm ci --ignore-scripts --silent
      - name: Apply repository formatting
        run: npx prettier --write src/components/presence/editor/PresenceEditorLayout.tsx src/components/presence/editor/SectionList.tsx src/components/presence/editor/sections/HeroSectionEditor.tsx src/components/presence/editor/sections/OwnerSectionEditor.tsx src/components/presence/editor/sections/ProcessSectionEditor.tsx src/components/presence/sections/ProcessSection.tsx src/components/presence/sections/SectionRenderer.tsx src/contexts/ThemeProvider.tsx src/lib/templates/__tests__/presence-editor-art-direction.test.ts src/lib/templates/premium-runtime-art-direction.ts src/types/page-sections.ts
      - name: Commit formatted files
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/presence/editor/PresenceEditorLayout.tsx src/components/presence/editor/SectionList.tsx src/components/presence/editor/sections/HeroSectionEditor.tsx src/components/presence/editor/sections/OwnerSectionEditor.tsx src/components/presence/editor/sections/ProcessSectionEditor.tsx src/components/presence/sections/ProcessSection.tsx src/components/presence/sections/SectionRenderer.tsx src/contexts/ThemeProvider.tsx src/lib/templates/__tests__/presence-editor-art-direction.test.ts src/lib/templates/premium-runtime-art-direction.ts src/types/page-sections.ts
          git commit -m "Format presence editor art direction changes"
          git push origin HEAD:feat/presence-editor-art-direction-therapist
